apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: capsule
spec:
  syncMode: ContinuousWithDriftDetection
  reloader: true
  clusterSelector:
    matchLabels:
      capsule: 'true'
  templateResourceRefs:
    - identifier: ClusterAnnotations
      resource:
        apiVersion: cluster.x-k8s.io/v1beta1
        kind: Cluster
        name: '{{ .Cluster.metadata.name }}'
        namespace: '{{ .Cluster.metadata.namespace }}'
  policyRefs:
    - kind: ConfigMap
      name: capsule-helm-resources
      namespace: projectsveltos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: capsule-helm-resources
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: 'true'
data:
  helmrepository.yaml: |
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: HelmRepository
    metadata:
      name: capsule
      namespace: flux-system
    spec:
      type: 'oci'
      interval: 12h0m0s
      url: oci://ghcr.io/projectcapsule/charts
  helmrelease.yaml: |-
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: capsule
      namespace: flux-system
    spec:
      serviceAccountName: kustomize-controller
      targetNamespace: 'capsule-system'
      interval: 10m
      releaseName: 'capsule'
      chart:
        spec:
          chart: capsule
          version: '0.10.9'
          sourceRef:
            kind: HelmRepository
            name: capsule
          interval: 24h
      install:
        createNamespace: true
      upgrade:
        remediation:
          remediateLastFailure: true
      driftDetection:
        mode: enabled
      values:
        crds:
          install: true
        certManager:
          generateCertificates: true
        tls:
          enableController: false
          create: false
        manager:
          options:
            capsuleConfiguration: default
            capsuleUserGroups:
              - "{{ .Cluster.metadata.name }}-kube-user"
              {{- $groups := splitList "," (index (getResource "ClusterAnnotations").metadata.annotations "chihiro.io/groups") }}
              {{- range $groups }}
              {{- $group := trim . }}
              - "{{ $group }}"
              {{- end }}
              - kube-admin
            forceTenantPrefix: true
            ignoreUserWithGroups:
              - dummy
        webhooks:
          hooks:
            nodes:
              failurePolicy: Ignore
        serviceMonitor:
          enabled: false
        proxy:
          enabled: true
          image:
            registry: zot.bealv.io
            repository: public/capsule-proxy
            tag: latest
          webhooks:
            enabled: true
          certManager:
            generateCertificates: false
          options:
            SSLCertFileName: ''
            SSLKeyFileName: ''
            enableSSL: false
            generateCertificates: false
            oidcUsernameClaim: 'email'
            extraArgs:
              - '--feature-gates=ProxyClusterScoped=true'
              - '--feature-gates=ProxyAllNamespaced=true'
          resources:
            limits:
              memory: 256Mi
  tenant.yaml: |
    apiVersion: capsule.clastix.io/v1beta2
    kind: Tenant
    metadata:
      name: "{{ .Cluster.metadata.name }}-kube-user"
    spec:
      cordoned: false
      ingressOptions:
        hostnameCollisionScope: Disabled
      serviceOptions:
          allowedServices:
            nodePort: false
            loadBalancer: false
      resourceQuotas:
        items:
        - hard:
            limits.cpu: "4"
            limits.memory: 6Gi
            requests.cpu: "4"
            requests.memory: 6Gi
        - hard:
            requests.storage: 20Gi
      namespaceOptions:
        additionalMetadataList:
          - labels:
              pod-security.kubernetes.io/enforce: restricted
      owners:
      {{- $groups := splitList "," (index (getResource "ClusterAnnotations").metadata.annotations "chihiro.io/groups") }}
      {{- range $groups }}
      {{- $group := trim . }}
      - clusterRoles:
        - admin
        - capsule-namespace-deleter
        kind: Group
        name: "{{ $group }}"
      {{- end }}
      - clusterRoles:
        - admin
        - capsule-namespace-deleter
        kind: Group
        name: "kube-admin"
      preventDeletion: false
      resourceQuotas:
        scope: Tenant
  globaltenantresource.yaml: |
    apiVersion: capsule.clastix.io/v1beta2
    kind: GlobalTenantResource
    metadata:
      name: netpol-lock
    spec:
      tenantSelector:
        matchLabels:
          kubernetes.io/metadata.name: "{{ .Cluster.metadata.name }}-kube-user"
      resyncPeriod: 60s
      resources:
        - namespaceSelector:
            matchLabels:
              capsule.clastix.io/tenant: "{{ .Cluster.metadata.name }}-kube-user"
          rawItems:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              labels:
                capsule.clastix.io/tenant: "{{ .Cluster.metadata.name }}-kube-user"
              name: netpol-lock
            spec:
              ingress:
              - from:
                - namespaceSelector:
                    matchLabels:
                      capsule.clastix.io/tenant: oil
              policyTypes:
              - Ingress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-all-except-local
              namespace: default
            spec:
              podSelector: {} # Applies to all pods in the namespace
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                    - ipBlock:
                        cidr: 0.0.0.0/0
                        except:
                          - 192.168.0.0/16
                          - 10.0.0.0/8
              egress:
                - to:
                    - ipBlock:
                        cidr: 0.0.0.0/0
                        except:
                          - 192.168.0.0/16
                          - 10.0.0.0/8
  service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: capsule-proxy-lb
      namespace: capsule-system
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
      - IPv4
      ipFamilyPolicy: SingleStack
      ports:
      - name: proxy
        port: 9001
      selector:
        app.kubernetes.io/instance: capsule
        app.kubernetes.io/name: proxy
      type: LoadBalancer
  ingress-validation.yaml: |
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingAdmissionPolicy
    metadata:
      name: ingress-structure-validation
    spec:
      failurePolicy: Fail
      matchConstraints:
        resourceRules:
        - apiGroups: ["networking.k8s.io"]
          apiVersions: ["v1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["ingresses"]
      paramKind:
        apiVersion: v1
        kind: ConfigMap
      validations:
      - expression: "object.spec.rules.size() > 0"
        message: "Ingress must have at least one rule"
      - expression: "object.spec.rules.all(rule, has(rule.host))"
        message: "All rules must specify a host"
      - expression: "object.spec.rules.all(rule, rule.host.endsWith('.' + params.data.clusterName + '.bealv.io'))"
        message: "All hosts must match the pattern <hostname>.{{ .Cluster.metadata.name }}.bealv.io"
      - expression: "object.spec.rules.all(rule, has(rule.http) && has(rule.http.paths))"
        message: "All rules must have http.paths defined"
      - expression: "object.spec.rules.all(rule, rule.http.paths.size() > 0)"
        message: "All rules must have at least one path"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.backend)))"
        message: "All paths must have a backend defined"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.backend.service)))"
        message: "All backends must specify a service"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.backend.service.name)))"
        message: "All backend services must have a name"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.backend.service.port)))"
        message: "All backend services must have a port"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.backend.service.port.number)))"
        message: "All backend service ports must have a number"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.path)))"
        message: "All paths must have a path field defined"
      - expression: "object.spec.rules.all(rule, rule.http.paths.all(path, has(path.pathType)))"
        message: "All paths must have a pathType defined"
    ---
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: ingress-validation-params
      namespace: capsule-system
    data:
      clusterName: "{{ .Cluster.metadata.name }}"
    ---
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingAdmissionPolicyBinding
    metadata:
      name: ingress-structure-validation-binding
    spec:
      policyName: ingress-structure-validation
      validationActions: [Deny]
      paramRef:
        name: ingress-validation-params
        namespace: capsule-system
        parameterNotFoundAction: Deny
      matchResources:
        namespaceSelector:
          matchExpressions:
          - key: capsule.clastix.io/tenant
            operator: Exists
---
apiVersion: lib.projectsveltos.io/v1beta1
kind: EventSource
metadata:
  name: tenant-created
spec:
  collectResources: true
  resourceSelectors:
    - group: 'capsule.clastix.io'
      version: 'v1beta2'
      kind: 'Tenant'
---
apiVersion: lib.projectsveltos.io/v1beta1
kind: EventTrigger
metadata:
  name: tenant-namespace-creator
spec:
  sourceClusterSelector:
    matchLabels:
      capsule: 'true'
  destinationClusterSelector:
    matchLabels:
      capsule: 'true'
  eventSourceName: tenant-created
  syncMode: ContinuousWithDriftDetection
  templateResourceRefs:
    - resource:
        apiVersion: v1
        kind: ConfigMap
        name: tenant-readme-html
        namespace: projectsveltos
      identifier: ReadmeHTML
  policyRefs:
    - kind: ConfigMap
      name: tenant-namespace-template
      namespace: projectsveltos
    - kind: ConfigMap
      name: tenant-readmehtml-template
      namespace: projectsveltos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-readmehtml-template
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: 'true'
data:
  readme-configmap.yaml: |
    {{ $cluster := .Cluster }}
    {{ $htmlContent := index (getResource "ReadmeHTML").data "index.html" }}
    ---
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: nginx-readme
      namespace: {{ .Resource.metadata.name }}-default
    data:
      index.html: |
        {{ $htmlContent | nindent 8 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-namespace-template
  namespace: projectsveltos
  annotations:
    projectsveltos.io/instantiate: 'true'
data:
  namespace.yaml: |
    {{ $cluster := .Cluster }}
    {{- range $resource := .Resources }}
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      name: {{ $resource.metadata.name }}-default
      labels:
        pod-security.kubernetes.io/enforce: restricted
      ownerReferences:
        - apiVersion: {{ $resource.apiVersion }}
          kind: {{ $resource.kind }}
          name: {{ $resource.metadata.name }}
          uid: {{ $resource.metadata.uid }}
    {{ end }}
  deploy.yaml: |
    {{ $cluster := .Cluster }}
    {{- range $resource := .Resources }}
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: readme-nginx
      namespace: {{ $resource.metadata.name }}-default
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: readme-nginx
      template:
        metadata:
          labels:
            app: readme-nginx
        spec:
          containers:
          - name: nginx
            image: nginx:alpine
            ports:
            - containerPort: 80
            volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          volumes:
          - name: html
            configMap:
              name: nginx-readme
    {{ end }}
  svc.yaml: |
    {{ $cluster := .Cluster }}
    {{- range $resource := .Resources }}
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: readme-nginx
      namespace: {{ $resource.metadata.name }}-default
    spec:
      selector:
        app: readme-nginx
      ports:
      - port: 80
        targetPort: 80
    {{ end }}
  ingress.yaml: |
    {{ $cluster := .Cluster }}
    {{- range $resource := .Resources }}
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: readme
      namespace: {{ $resource.metadata.name }}-default
    spec:
      rules:
      - host: readme.{{ $cluster.metadata.name }}.bealv.io
        http:
          paths:
          - backend:
              service:
                name: readme-nginx
                port:
                  number: 80
            path: /
            pathType: Prefix
    {{ end }}
