apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-readme-html
  namespace: projectsveltos
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Ingress Creation Guide</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 2rem;
          color: #333;
        }
        .container {
          max-width: 900px;
          margin: 0 auto;
          background: white;
          border-radius: 12px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.3);
          padding: 3rem;
        }
        h1 {
          color: #667eea;
          margin-bottom: 1rem;
          font-size: 2.5rem;
        }
        h2 {
          color: #764ba2;
          margin-top: 2rem;
          margin-bottom: 1rem;
          font-size: 1.8rem;
        }
        p {
          line-height: 1.6;
          margin-bottom: 1rem;
          color: #555;
        }
        pre {
          background: #f5f5f5;
          border-left: 4px solid #667eea;
          padding: 1.5rem;
          border-radius: 8px;
          overflow-x: auto;
          margin: 1rem 0;
          font-size: 0.9rem;
        }
        code {
          font-family: 'Monaco', 'Courier New', monospace;
          color: #333;
        }
        .alert {
          background: #fff3cd;
          border-left: 4px solid #ffc107;
          padding: 1rem;
          margin: 1rem 0;
          border-radius: 4px;
        }
        .info {
          background: #d1ecf1;
          border-left: 4px solid #17a2b8;
          padding: 1rem;
          margin: 1rem 0;
          border-radius: 4px;
        }
        ul {
          margin-left: 2rem;
          margin-bottom: 1rem;
          color: #555;
        }
        li {
          margin-bottom: 0.5rem;
        }
        .cluster-name {
          color: #667eea;
          font-weight: bold;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>🚀 Ingress Creation Guide</h1>
        <p>Welcome to your tenant!</p>

        <div class="info">
          <strong>ℹ️ Info:</strong> This guide will help you create Ingress resources with the correct structure.
        </div>

        <h2>📋 Required Ingress Structure</h2>
        <p>Your Ingress must follow this exact structure with one or more backend services:</p>

        <pre><code>apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: your-app-name
      namespace: your-namespace
    spec:
      rules:
      - host: your-app.<span class="cluster-name">CLUSTER_NAME</span>.bealv.io
        http:
          paths:
          - backend:
              service:
                name: your-service-name
                port:
                  number: 8080
            path: /api
            pathType: Prefix
          - backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
            path: /
            pathType: Prefix</code></pre>

        <h2>🔍 Example with Multiple Backends</h2>
        <pre><code>apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: my-app
      namespace: my-app
    spec:
      rules:
      - host: my-app.<span class="cluster-name">CLUSTER_NAME</span>.bealv.io
        http:
          paths:
          - backend:
              service:
                name: my-app
                port:
                  number: 8080
            path: /api
            pathType: Prefix
          - backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
            path: /
            pathType: Prefix</code></pre>

        <div class="alert">
          <strong>⚠️ Important:</strong> After creating your Ingress, wait for it to sync. The system will automatically provision the necessary resources.
        </div>

        <h2>🛡️ Validation Policy</h2>
        <p>A ValidatingAdmissionPolicy is in place to ensure all Ingresses follow the required structure. Non-compliant Ingresses will be rejected.</p>

        <h2>⚙️ Cluster Configuration</h2>
        <div class="alert">
          <strong>Note:</strong> This cluster does not support Service type LoadBalancer as it is fully managed. All external access must be configured through Ingress resources.
        </div>

        <h2>🔐 Kubeconfig Setup</h2>
        <p>To access the cluster, you need to set up your kubeconfig file:</p>

        <h3>Option 1: Set KUBECONFIG Environment Variable</h3>
        <pre><code>export KUBECONFIG=/path/to/downloaded/kubeconfig.yaml
        kubectl get pods -A</code></pre>

        <h3>Option 2: Merge with Default Kubeconfig</h3>
        <pre><code># Backup your current config
        cp ~/.kube/config ~/.kube/config.backup

        # Merge the downloaded kubeconfig
        KUBECONFIG=~/.kube/config:/path/to/downloaded/kubeconfig.yaml kubectl config view --flatten > /tmp/merged-config
        mv /tmp/merged-config ~/.kube/config

        # Switch to the new context
        kubectl config use-context CLUSTER_NAME-kube-user@CLUSTER_NAME

        # Verify access
        kubectl get namespaces</code></pre>

        <h3>Option 3: Use with --kubeconfig Flag</h3>
        <pre><code>kubectl --kubeconfig=/path/to/downloaded/kubeconfig.yaml get pods -A</code></pre>

        <div class="info">
          <strong>💡 Tip:</strong> The downloaded kubeconfig is pre-configured with your tenant context. You can switch between contexts using <code>kubectl config use-context</code>.
        </div>

      </div>
    </body>
    </html>
