apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kamaji
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: charts/kamaji
      version: '*'
      sourceRef:
        kind: GitRepository
        name: kamaji
        namespace: kamaji-system
  values:
    replicaCount: 1
    resources:
      limits:
        cpu: 400m
        memory: 300Mi
      requests:
        cpu: 200m
        memory: 60Mi
    image:
      repository: clastix/kamaji
      pullPolicy: Always
      tag: edge-25.10.2
    kamaji-etcd:
      deploy: true
      fullnameOverride: kamaji-etcd
      clusterDomain: bealv-mgmt.local
      image:
        tag: v3.6.5
      datastore:
        enabled: true
        name: default
